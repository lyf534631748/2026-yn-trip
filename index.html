<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>云南14日深度游 🏔️</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f7f5f0;
  --card: #ffffff;
  --primary: #e67e22;
  --primary-light: #fef3e2;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #e8e4dd;
  --tag-bg: #e8f4f8;
  --tag-text: #2980b9;
  --warning: #e74c3c;
  --success: #27ae60;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: linear-gradient(135deg, #e67e22, #f39c12);
  color: white;
  padding: 20px 16px 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .subtitle { font-size: 13px; opacity: 0.9; margin-top: 2px; }

/* Day tabs - horizontal scroll */
.tab-bar {
  display: flex;
  overflow-x: auto;
  background: white;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 68px;
  z-index: 99;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-light);
  border: none;
  background: none;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.2s;
}
.tab-btn.active {
  color: var(--primary);
  font-weight: 700;
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}
.tab-btn .day-num { display: block; font-size: 11px; opacity: 0.7; }
.tab-btn.is-today {
  color: var(--primary);
}
.tab-btn.is-today::before {
  content: '📍';
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 10px;
}

/* Content area */
.content {
  padding: 12px 12px 80px;
  display: none;
}
.content.active { display: block; }

/* Day header */
.day-header {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.day-header .date-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.day-header .day-tag {
  background: var(--primary);
  color: white;
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
}
.day-header .date-text {
  font-size: 15px;
  font-weight: 600;
}
.day-header .theme {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 4px;
}
.day-header .city-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--tag-text);
  background: var(--tag-bg);
  display: inline-flex;
  padding: 4px 10px;
  border-radius: 20px;
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 24px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 7px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
  border-radius: 1px;
}

/* Event card */
.event {
  position: relative;
  margin-bottom: 10px;
}
.event::before {
  content: '';
  position: absolute;
  left: -21px;
  top: 14px;
  width: 10px;
  height: 10px;
  background: white;
  border: 2px solid var(--primary);
  border-radius: 50%;
  z-index: 1;
}
.event.past::before {
  background: var(--primary);
  border-color: var(--primary);
}
.event-card {
  background: white;
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.event-card .time {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 4px;
}
.event-card .title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}
.event-card .desc {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.5;
}

/* Location link */
.loc-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--tag-text);
  font-size: 13px;
  text-decoration: none;
  padding: 4px 10px;
  background: var(--tag-bg);
  border-radius: 20px;
  margin-top: 6px;
  margin-right: 4px;
  transition: background 0.2s;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
.loc-link:hover { background: #d0eaf5; }
.loc-link:active { background: #b8dff0; }
.loc-link svg { width: 14px; height: 14px; flex-shrink: 0; }

/* Tags */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.tag-food { background: #fef3e2; color: #e67e22; }
.tag-ticket { background: #e8f4f8; color: #2980b9; }
.tag-tip { background: #fde8e8; color: #e74c3c; }
.tag-hotel { background: #e8f8f0; color: #27ae60; }
.tag-drive { background: #f0e8f8; color: #8e44ad; }
.tag-rain { background: #e8eaf8; color: #5b6abf; }

/* Note box */
.note {
  background: #fff8e1;
  border-left: 3px solid #ffc107;
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
  font-size: 13px;
  line-height: 1.5;
}
.note.warn {
  background: #fde8e8;
  border-left-color: #e74c3c;
}

/* Budget bar */
.budget-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  font-size: 13px;
}
.budget-bar .label { color: var(--text-light); }
.budget-bar .amount { font-weight: 700; color: var(--primary); font-size: 16px; }

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: var(--text-light);
}

/* Responsive */
@media (min-width: 600px) {
  body { max-width: 480px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.08); min-height: 100vh; }
  .tab-btn { padding: 10px 18px; }
}
</style>
</head>

// Tag labels
const tagMap = {
  food: { text: '🍜 美食', cls: 'tag-food' },
  ticket: { text: '🎫 门票', cls: 'tag-ticket' },
  tip: { text: '💡 提示', cls: 'tag-tip' },
  hotel: { text: '🏨 住宿', cls: 'tag-hotel' },
  drive: { text: '🚗 自驾', cls: 'tag-drive' },
  rain: { text: '🌧️ 雨天', cls: 'tag-rain' }
};

// Amap link
function amapLink(name, lat, lng) {
  return `https://uri.amap.com/marker?position=${lng},${lat}&name=${encodeURIComponent(name)}&callnative=1`;
}

// Check if mobile
function isMobile() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

// Build tabs
function buildTabs() {
  const bar = document.getElementById('tabBar');
  days.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.day = d.day;
    btn.innerHTML = `D${d.day}`;
    btn.title = `${d.date} ${d.theme}`;
    btn.onclick = () => switchTab(d.day);
    bar.appendChild(btn);
  });
}

// Build content
function buildContent() {
  const area = document.getElementById('contentArea');
  days.forEach(d => {
    const div = document.createElement('div');
    div.className = 'content';
    div.id = `day-${d.day}`;

    let html = `
      <div class="day-header">
        <div class="date-row">
          <span class="day-tag">Day ${d.day}</span>
          <span class="date-text">${d.date}（${d.weekday}）</span>
        </div>
        <div class="theme">${d.theme}</div>
        <span class="city-row">📍 ${d.city} · 海拔 ${d.alt}</span>
      </div>
      <div class="timeline">
    `;

    d.events.forEach(ev => {
      html += `<div class="event"><div class="event-card">`;
      html += `<div class="time">${ev.time}</div>`;
      html += `<div class="title">${ev.title}</div>`;
      if (ev.desc) html += `<div class="desc">${ev.desc}</div>`;

      // Location links
      if (ev.locs) {
        ev.locs.forEach(loc => {
          const link = amapLink(loc.name, loc.lat, loc.lng);
          html += `<a class="loc-link" href="${link}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${loc.name}
          </a>`;
        });
      }

      // Tags
      if (ev.tags) {
        html += '<div class="tags">';
        ev.tags.forEach(t => {
          if (tagMap[t]) html += `<span class="tag ${tagMap[t].cls}">${tagMap[t].text}</span>`;
        });
        html += '</div>';
      }

      html += `</div></div>`;
    });

    html += '</div>';

    // Notes
    if (d.notes && d.notes.length) {
      d.notes.forEach(n => {
        const isWarn = n.startsWith('⚠️');
        html += `<div class="note ${isWarn ? 'warn' : ''}">${n}</div>`;
      });
    }

    // Rain note
    if (d.rainNote) {
      html += `<div class="note" style="background:#e8eaf8;border-left-color:#5b6abf">
        <strong>${d.rainNote.title}</strong>
        <ul style="margin:4px 0 0 16px;font-size:12px;color:#5b6abf">${d.rainNote.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>`;
    }

    // Budget
    html += `<div class="budget-bar">
      <span class="label">💰 今日预算（2人）</span>
      <span class="amount">${d.budget}</span>
    </div>`;

    div.innerHTML = html;
    area.appendChild(div);
  });
}

// Switch tab
function switchTab(day) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-day="${day}"]`).classList.add('active');
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById(`day-${day}`).classList.add('active');

  // Scroll tab into view
  const btn = document.querySelector(`.tab-btn[data-day="${day}"]`);
  btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// Auto-select today's tab
function autoSelect() {
  const now = new Date();
  // Trip dates: 2026-05-04 to 2026-05-18
  const tripStart = new Date(2026, 4, 4); // May 4
  const tripEnd = new Date(2026, 4, 18);  // May 18

  let day = 1;
  if (now >= tripStart && now <= tripEnd) {
    day = Math.floor((now - tripStart) / 86400000) + 1;
    day = Math.min(day, 15);
  }
  switchTab(day);
}

// Init
buildTabs();
buildContent();
autoSelect();

// PWA-like: prevent pull-to-refresh on mobile
document.body.addEventListener('touchmove', function(e) {}, { passive: true });
</script>
