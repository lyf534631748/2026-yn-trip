let curD=1;
const PK_KEY='yn2026_pk';

function getPkState(){
  try{return JSON.parse(localStorage.getItem(PK_KEY))||{}}catch(e){return{}}
}
function savePkState(s){localStorage.setItem(PK_KEY,JSON.stringify(s))}
function togglePk(key,el){
  const st=getPkState();
  st[key]=!st[key];
  savePkState(st);
  el.classList.toggle('done');
  updatePkProgress();
}
function updatePkProgress(){
  let total=0,done=0;
  pkData.forEach(s=>s.items.forEach((_,i)=>{total++;if(getPkState()[s.s+'_'+i])done++}));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pkFill').style.width=pct+'%';
  document.getElementById('pkPct').textContent=pct+'%';
}

  const app=document.getElementById('app');
  let mh='<div class="menu-hd">📅 选择日程</div>';
  mh+=`<button class="mi" data-d="bk" onclick="go('bk');toggleMenu()"><span class="mi-num">📋</span><span class="mi-info">景点预约提醒<span class="mi-th">需提前预订的景点清单</span></span></button>`;
  mh+=`<button class="mi" data-d="pk" onclick="go('pk');toggleMenu()"><span class="mi-num">🎒</span><span class="mi-info">物资准备清单<span class="mi-th">可勾选打勾，进度保存到本地</span></span></button>`;
  D.forEach(r=>{
    mh+=`<button class="mi" data-d="${r.d}" onclick="go(${r.d});toggleMenu()"><span class="mi-num">D${r.d}</span><span class="mi-info">${r.dt} ${r.wd}<span class="mi-th">${r.th}</span></span></button>`;
  });
  menu.innerHTML=mh;

  D.forEach(r=>{
    const c=document.createElement('div');
    c.className='ct';c.id='d'+r.d;
    let h=`<div class="badge">📍 ${r.city} · ${r.alt}</div><div class="theme">${r.th}</div><div class="tl">`;
    r.ev.forEach(e=>{
      h+=`<div class="ev"><div class="ec"><div class="t">${e.t}</div><div class="tt">${e.tt}</div>`;
      if(e.ds)h+=`<div class="ds">${e.ds}</div>`;
      if(e.lc)e.lc.forEach(l=>{h+=`<span class="ll" onclick="openLoc('${l.n.replace(/'/g,"\\'")}',${l.la},${l.lo},event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${l.n}</span>`});
      if(e.tg){h+='<div class="tgs">';e.tg.forEach(t=>{if(tgM[t])h+=`<span class="tg ${tgM[t].c}">${tgM[t].t}</span>`});h+='</div>'}
      h+=`</div></div>`;
    });
    h+='</div>';
    if(r.ns)r.ns.forEach(n=>{h+=`<div class="nt${n.startsWith('\u26a0\ufe0f')?' w':''}">${n}</div>`});
    if(r.rn)h+=`<div class="nt r"><strong>\ud83c\udf27\ufe0f 雨天备选</strong><ul style="margin:4px 0 0 14px;font-size:11px">${r.rn.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    h+=`<div class="bgb"><span class="lb">\ud83d\udcb0 今日预算（2人）</span><span class="am">${r.b}</span></div>`;
    c.innerHTML=h;app.appendChild(c);
  });

  // Booking page
  const bk=document.createElement('div');
  bk.className='ct';bk.id='dBk';
  let bh='<div class="theme">📋 景点预约提醒</div>';
  bh+='<div class="nt" style="margin-bottom:12px">⚠️ 只含需提前预订的景点门票和住宿，不含车票机票</div>';
  bkData.forEach(b=>{
    bh+=`<div class="bk-item"><div class="bk-head"><span class="bk-name">${b.name}</span><span class="bk-price">${b.price}</span></div>`;
    bh+=`<div class="bk-day">📅 ${b.day}</div>`;
    bh+=`<div class="bk-how">💡 ${b.how}</div>`;
    bh+=`<div class="bk-when ${b.lv}">⏰ ${b.when}</div>`;
    if(b.tip)bh+=`<div style="margin-top:6px;font-size:11px;color:var(--accent)">${b.tip}</div>`;
    bh+='</div>';
  });
  bk.innerHTML=bh;app.appendChild(bk);

  // Packing page
  const pk=document.createElement('div');
  pk.className='ct';pk.id='dPk';
  const pst=getPkState();
  let total=0,done=0;
  let ph='<div class="theme">🎒 物资准备清单</div>';
  ph+='<div class="nt" style="margin-bottom:12px">✅ 点击物品可打勾，勾选状态自动保存到本地</div>';
  ph+='<div class="pk-progress"><div class="pk-bar"><div class="pk-fill" id="pkFill"></div></div><div class="pk-pct" id="pkPct">0%</div></div>';
  pkData.forEach((sec,si)=>{
    ph+=`<div class="pk-sec"><div class="pk-sec-title">${sec.s}</div>`;
    sec.items.forEach((it,ii)=>{
      const key=sec.s+'_'+ii;
      const ck=pst[key];
      if(ck)done++;
      total++;
      ph+=`<div class="pk-row${ck?' done':''}" onclick="togglePk('${key}',this)">`;
      ph+=`<div class="pk-ck">${ck?'✓':''}</div>`;
      ph+=`<div><div class="pk-name">${it.n}</div>`;
      if(it.tip)ph+=`<div class="pk-note">${it.tip}</div>`;
      ph+=`</div>`;
      ph+=`<div class="pk-cnt">${it.c}</div>`;
      ph+=`</div>`;
    });
    ph+=`</div>`;
  });
  pk.innerHTML=ph;app.appendChild(pk);
  // set initial progress
  setTimeout(()=>{
    const pct=total?Math.round(done/total*100):0;
    const fill=document.getElementById('pkFill');
    const pctEl=document.getElementById('pkPct');
    if(fill)fill.style.width=pct+'%';
    if(pctEl)pctEl.textContent=pct+'%';
  },50);

  auto();
}

function go(d){
  document.querySelectorAll('.mi').forEach(m=>m.classList.remove('act'));
  document.querySelectorAll('.ct').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.hbtn.act,.bnb.act').forEach(b=>b.classList.remove('act'));
  if(d==='bk'){
    const mi=document.querySelector('.mi[data-d="bk"]');
    if(mi)mi.classList.add('act');
    document.getElementById('dBk').classList.add('on');
    document.getElementById('hdDay').textContent='景点预约提醒';
    document.getElementById('bkBtn').classList.add('act');
    document.getElementById('bBk').classList.add('act');
  }else if(d==='pk'){
    const mi=document.querySelector('.mi[data-d="pk"]');
    if(mi)mi.classList.add('act');
    document.getElementById('dPk').classList.add('on');
    document.getElementById('hdDay').textContent='🎒 物资准备清单';
    document.getElementById('pkBtn').classList.add('act');
    document.getElementById('bPk').classList.add('act');
  }else{
    curD=d;
    const r=D.find(x=>x.d===d);
    const mi=document.querySelector('.mi[data-d="'+d+'"]');
    if(mi)mi.classList.add('act');
    const ct=document.getElementById('d'+d);
    if(ct)ct.classList.add('on');
    document.getElementById('hdDay').textContent='Day '+d+' · '+r.dt+' '+r.wd;
  }
}

function nav(dir){
  if(typeof curD!=='number')curD=1;
  const nd=Math.max(1,Math.min(15,curD+dir));
  if(nd!==curD)go(nd);
}

function toggleMenu(){document.getElementById('menu').classList.toggle('on');document.getElementById('ov').classList.toggle('on')}

function openLoc(name,lat,lng,e){
  e.stopPropagation();
  // 查找该地点的POI ID
  var poiId=null;
  var allLocs=document.querySelectorAll('.ll');
  // 从页面的location数据中提取poi
  var found=D.flatMap(function(d){return d.ev||[]}).flatMap(function(ev){return ev.lc||[]}).find(function(l){return l.n===name && l.poi;});
  if(found) poiId=found.poi;
  var ua=navigator.userAgent;
  var isI=/iPhone|iPad|iPod/i.test(ua);
  var opened=false;
  var t;
  function fallback(){
    if(!opened){
      if(poiId){
        window.location.href='https://uri.amap.com/marker?position='+lng+','+lat+'&name='+encodeURIComponent(name)+'&callnative=1&src=yntrip&innersrc=uri';
      }else{
        window.location.href='https://uri.amap.com/marker?position='+lng+','+lat+'&name='+encodeURIComponent(name)+'&callnative=1';
      }
    }
  }
  // 优先用POI ID跳转高德详情
  if(poiId){
    if(isI){
      window.location.href='iosamap://viewMap?sourceApplication=yntrip&poiname='+encodeURIComponent(name)+'&poiid='+poiId+'&lat='+lat+'&lon='+lng+'&dev=0';
    }else{
      window.location.href='intent://viewMap?sourceApplication=yntrip&poiname='+encodeURIComponent(name)+'&poiid='+poiId+'&lat='+lat+'&lon='+lng+'&dev=0#Intent;scheme=androidamap;package=com.autonavi.minimap;end';
    }
  }else{
    // 没有POI ID的用原始坐标跳转
    if(isI){
      window.location.href='iosamap://viewMap?sourceApplication=yntrip&poiname='+encodeURIComponent(name)+'&lat='+lat+'&lon='+lng+'&dev=0';
    }else{
      window.location.href='intent://viewMap?sourceApplication=yntrip&poiname='+encodeURIComponent(name)+'&lat='+lat+'&lon='+lng+'&dev=0#Intent;scheme=androidamap;package=com.autonavi.minimap;end';
    }
  }
  t=setTimeout(fallback,1500);
  document.addEventListener('visibilitychange',function(){if(document.hidden){opened=true;clearTimeout(t);}},{once:true});
  window.addEventListener('pagehide',function(){opened=true;clearTimeout(t);},{once:true});
}

function auto(){
  const now=new Date();const s=new Date(2026,4,4);
  let d=1;
  if(now>=s&&now<=new Date(2026,4,18))d=Math.min(Math.floor((now-s)/864e5)+1,15);
  go(d);
}

/* swipe-to-switch-day removed */
init();
</script>
